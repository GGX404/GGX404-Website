<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Font Preloads (Saves time) -->
    <link href="styles/fonts/ProggyCleanSZNerdFont-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous" rel="preload">
    <link href="styles/fonts/ProggyCleanSZNerdFont-Regular.woff" as="font" type="font/woff" crossorigin="anonymous" rel="preload">
    <link href="styles/fonts/ProggyCleanSZNerdFont-Regular.ttf" as="font" type="font/ttf" crossorigin="anonymous" rel="preload">
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="styles/favicion_io(1)/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="styles/favicon_io(1)/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="styles/favicon_io(1)/favicon-16x16.png" />
    <!-- CSS sheets -->
    <link rel="stylesheet" href="/styles/styles.css" id="main-stylesheet" />
    <link href="styles/fonts.css" rel="stylesheet"/>
    <link rel="stylesheet" type='text/css' href="styles/devicon.min.css" /> 
    <!-- Javasripts -->
    <script type="module" src="/src/homepage.jsx"></script>

    <link rel="manifest" href="/site.webmanifest" />
    <!--  <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />-->
  </head>

  <body class="">
    <div id="root"></div>
    <script>
      const hamburger = document.getElementById("hamburger");
      const navLinks = document.getElementById("nav-links");
      const dropdownToggles = document.querySelectorAll(".dropdown-toggle");

      hamburger.addEventListener("click", () => {
        navLinks.classList.toggle("active");
      });

      dropdownToggles.forEach((toggle) => {
        toggle.addEventListener("click", (e) => {
          if (window.innerWidth <= 768) {
            e.preventDefault();
            const dropdown = toggle.parentElement;
            dropdown.classList.toggle("open");
          }
        });
      });

      // Optional: Close dropdowns when clicking outside
      document.addEventListener("click", (e) => {
        if (!e.target.closest(".dropdown")) {
          document
            .querySelectorAll(".dropdown.open")
            .forEach((d) => d.classList.remove("open"));
        }
      });
    </script>
    <script files="/src/jssupport.js"></script>
  </body>
</html>
